<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM NANCY RAMOS 2 CELL>
<style>
  :root{
    --azul:#1B3A6B; --azul2:#2563c9; --verde:#1f8f4e; --paper:#eef1f6;
    --card:#fff; --ink:#16233a; --muted:#6b7280; --line:#dce1ea;
    --done:#e9f7ee; --cadih:#1B3A6B; --amarillo:#d97706;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);padding:12px;font-size:15px}
  header{background:var(--azul);color:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px}
  header h1{font-size:1.2rem}
  header .sub{font-size:.8rem;opacity:.9;margin-top:3px}
  .warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:.8rem;padding:9px 12px;border-radius:9px;margin-bottom:12px;line-height:1.45}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .stat{flex:1;min-width:88px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center}
  .stat b{display:block;font-size:1.3rem;color:var(--azul)}
  .stat span{font-size:.72rem;color:var(--muted)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:12px}
  .panel h3{font-size:.82rem;color:var(--azul);margin-bottom:9px;text-transform:uppercase;letter-spacing:.5px}
  .msgbtns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .msgbtn{border:2px solid var(--line);background:#fff;border-radius:9px;padding:11px 8px;font-size:.83rem;font-weight:700;cursor:pointer;color:var(--ink)}
  .msgbtn.active{background:var(--verde);border-color:var(--verde);color:#fff}
  .preview{margin-top:10px;background:#f6f8fb;border:1px dashed var(--line);border-radius:9px;padding:11px;font-size:.82rem;white-space:pre-wrap;line-height:1.5;color:#374151;max-height:200px;overflow:auto}
  .bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .bar input{flex:1;min-width:160px;border:1px solid var(--line);border-radius:9px;padding:11px 12px;font-size:.92rem}
  .filtros{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .fbtn{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 13px;font-size:.78rem;cursor:pointer;color:var(--muted)}
  .fbtn.on{background:var(--azul);color:#fff;border-color:var(--azul)}
  .fbtn.cadih.on{background:var(--cadih)}
  .lead{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:11px}
  .lead.contactado{background:var(--done)}
  .lead .top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
  .name{font-weight:700;font-size:1.05rem;line-height:1.25}
  .num{font-size:.72rem;color:var(--muted);margin-top:2px}
  .cel{font-size:1rem;font-weight:700;letter-spacing:.5px;margin:6px 0 2px}
  .meta{font-size:.8rem;color:var(--muted);line-height:1.5}
  .meta b{color:var(--ink);font-weight:600}
  .tag{font-size:.68rem;padding:3px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
  .tag.i{background:#e4f3ea;color:var(--verde)}
  .tag.m{background:#e3ecfb;color:var(--azul2)}
  .wabtns{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .wa{flex:1;min-width:128px;border:none;border-radius:9px;padding:12px 8px;font-size:.86rem;font-weight:700;color:#fff;cursor:pointer}
  .wa.iphone{background:var(--verde)} .wa.moto{background:var(--azul2)} .wa:active{transform:scale(.97)}
  .acc{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
  .accbtn{flex:1;min-width:130px;font-size:.78rem;padding:9px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:600}
  .accbtn.hoja{border-color:#fde68a;background:#fffbeb;color:var(--amarillo)}
  .accbtn.contacto{border-color:#c7d2fe;background:#eef2ff;color:#4338ca}
  .accbtn.msg{border-color:#bbf7d0;background:#f0fdf4;color:#15803d}
  .accbtn.cadih{color:#fff;border:none}
  select{border:1px solid var(--line);border-radius:8px;padding:10px;font-size:.84rem;background:#fff;margin-top:9px;width:100%;font-weight:600}
  .notas{margin-top:10px}
  .nota{font-size:.8rem;background:#f6f8fb;border-radius:7px;padding:7px 10px;margin-bottom:4px;display:flex;justify-content:space-between;gap:8px}
  .nota .fch{color:var(--muted);font-size:.68rem;white-space:nowrap}
  .nota .del{cursor:pointer;color:#dc2626;font-weight:700}
  .notaInput{display:flex;gap:6px;margin-top:6px}
  .notaInput input{flex:1;border:1px solid var(--line);border-radius:7px;padding:8px;font-size:.82rem}
  .notaInput button{border:none;background:var(--azul);color:#fff;border-radius:7px;padding:8px 13px;font-size:.82rem;cursor:pointer}
  .expbtn{width:100%;border:none;background:var(--cadih);color:#fff;border-radius:10px;padding:13px;font-size:.88rem;font-weight:700;cursor:pointer}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:24px;font-size:.85rem;opacity:0;transition:.25s;z-index:99;pointer-events:none;max-width:90%;text-align:center}
  .toast.show{opacity:1}
  footer{text-align:center;color:var(--muted);font-size:.7rem;margin:16px 0 8px}
</style>
</head>

const ESTADOS=[
  {v:"",t:"— Estado —"},
  {v:"wa1",t:"📨 Envié 1er WhatsApp"},
  {v:"wa2",t:"🔄 Envié 2do WhatsApp"},
  {v:"sol_cot",t:"💬 Solicitó cotización"},
  {v:"hoja",t:"📋 Ya solicité hoja amarilla"},
  {v:"env_cot",t:"💰 Ya envié cotización"},
  {v:"proceso",t:"⏳ En proceso"},
  {v:"ganado",t:"✅ Ganado"},
  {v:"descartado",t:"🚫 Descartado"}
];
const KEY="crm_jal2026_nancy_final";
let st={}; try{st=JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){st={};}
function save(){localStorage.setItem(KEY,JSON.stringify(st));}
function E(i){if(!st[i])st[i]={notas:[]};if(!st[i].notas)st[i].notas=[];return st[i];}
let msgSel=1, filtro="todos";

function titulo(l){
  const p=(l.nombre||"").split(" ")[0];
  const t=l.genero==="F"?"Sra.":(l.genero==="M"?"Sr.":"Sr./Sra.");
  return t+" "+p;
}
function armaMsg(num,l){
  let m=PLANTILLAS[String(num)]||"";
  return m.replace(/{T}/g,titulo(l)).replace(/{F}/g,l.fnac||"__/__/____");
}
function selMsg(n){
  msgSel=n;
  for(let i=1;i<=5;i++)document.getElementById("mb"+i).classList.remove("active");
  document.getElementById("mb"+n).classList.add("active");
  document.getElementById("preview").textContent=armaMsg(n,LEADS[0]);
  pinta(); toast("Mensaje "+n+" seleccionado");
}
function abrir(idx,quien){
  const l=LEADS[idx], msg=armaMsg(msgSel,l), cel="521"+l.cel;
  const url="https://web.whatsapp.com/send?phone="+cel+"&text="+encodeURIComponent(msg);
  const e=E(idx); e.contactado=true; e.via=quien;
  if(!e.estado||e.estado==="")e.estado=msgSel===2?"wa2":"wa1";
  save(); pinta(); window.open(url,"_blank");
}
function copy(txt,ok){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast(ok)).catch(()=>fallbackCopy(txt,ok));
  } else fallbackCopy(txt,ok);
}
function fallbackCopy(txt,ok){
  const ta=document.createElement("textarea"); ta.value=txt;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
  ta.select(); try{document.execCommand("copy"); toast(ok);}catch(e){toast("No se pudo copiar");}
  document.body.removeChild(ta);
}
function hojaAmarilla(idx){
  const l=LEADS[idx];
  const txt="NOMBRE: "+l.nombre+"\nCURP: "+l.curp+"\nNSS: "+l.nss+"\nCELULAR: "+l.cel;
  copy(txt,"📋 Datos hoja amarilla copiados");
  const e=E(idx); e.estado="hoja"; save(); pinta();
}
function copiarContacto(idx){
  const l=LEADS[idx], e=st[idx]||{};
  const suf=(e.via==="moto")?"JAL2026-Mot":"JAL2026-iP";
  copy(l.nombre+" "+suf,"🏷️ Contacto copiado: "+suf);
}
function copiarMensaje(idx){copy(armaMsg(msgSel,LEADS[idx]),"💬 Mensaje "+msgSel+" copiado");}
function setEstado(idx,v){E(idx).estado=v;save();pinta();}
function toggleCadih(idx){const e=E(idx);e.cadih=!e.cadih;save();pinta();toast(e.cadih?"Agregado a CADIH":"Quitado de CADIH");}
function addNota(idx){
  const inp=document.getElementById("ni"+idx), txt=(inp.value||"").trim();
  if(!txt)return;
  const f=new Date(), fch=f.getDate()+"/"+(f.getMonth()+1)+"/"+f.getFullYear();
  E(idx).notas.push({f:fch,t:txt}); inp.value=""; save(); pinta();
}
function delNota(idx,ni){E(idx).notas.splice(ni,1);save();pinta();}
function stats(){
  let cont=0,iph=0,mot=0,cad=0;
  LEADS.forEach((l,i)=>{const e=st[i];if(e&&e.contactado){cont++;if(e.via==="iphone")iph++;if(e.via==="moto")mot++;}if(e&&e.cadih)cad++;});
  document.getElementById("sTotal").textContent=LEADS.length;
  document.getElementById("sPend").textContent=LEADS.length-cont;
  document.getElementById("sCont").textContent=cont;
  document.getElementById("sIph").textContent=iph;
  document.getElementById("sMot").textContent=mot;
  document.getElementById("cadihCount").textContent=cad;
}
function pintaFiltros(){
  const cont=document.getElementById("filtros");
  let cad=0; LEADS.forEach((l,i)=>{if(st[i]&&st[i].cadih)cad++;});
  const fs=[{v:"todos",t:"Todos"},{v:"pend",t:"Pendientes"},{v:"cont",t:"Contactados"},{v:"ganado",t:"✅ Ganados"},{v:"descartado",t:"🚫 Descartados"},{v:"cadih",t:"📑 CADIH ("+cad+")",c:"cadih"}];
  cont.innerHTML="";
  fs.forEach(f=>{const b=document.createElement("button");b.className="fbtn"+(f.c?" "+f.c:"")+(filtro===f.v?" on":"");b.textContent=f.t;b.onclick=()=>{filtro=f.v;pinta();};cont.appendChild(b);});
}
function pasa(idx){
  const e=st[idx]||{};
  if(filtro==="todos")return true;
  if(filtro==="pend")return !e.contactado;
  if(filtro==="cont")return !!e.contactado;
  if(filtro==="cadih")return !!e.cadih;
  if(filtro==="ganado")return e.estado==="ganado";
  if(filtro==="descartado")return e.estado==="descartado";
  return true;
}
function pinta(){
  stats(); pintaFiltros();
  const q=(document.getElementById("buscar").value||"").toLowerCase();
  const cont=document.getElementById("lista"); cont.innerHTML=""; let vis=0;
  LEADS.forEach((l,idx)=>{
    if(!pasa(idx))return;
    const txt=(l.nombre+" "+l.colonia+" "+l.municipio+" "+l.cel).toLowerCase();
    if(q&&!txt.includes(q))return;
    vis++;
    const e=st[idx]||{};
    const div=document.createElement("div");
    div.className="lead"+(e.contactado?" contactado":"");
    const dir=[l.calle,l.ext,l.colonia,l.municipio,l.cp].filter(Boolean).join(", ");
    let viaTag="";
    if(e.contactado&&e.via==="iphone")viaTag='<span class="tag i">✓ iPhone</span>';
    if(e.contactado&&e.via==="moto")viaTag='<span class="tag m">✓ Motorola</span>';
    let opts=ESTADOS.map(s=>'<option value="'+s.v+'"'+(e.estado===s.v?' selected':'')+'>'+s.t+'</option>').join("");
    let notasHtml=(e.notas||[]).map((n,ni)=>'<div class="nota"><span>'+n.t+'</span><span class="fch">'+n.f+' <span class="del" onclick="delNota('+idx+','+ni+')">🗑️</span></span></div>').join("");
    div.innerHTML=
      '<div class="top"><div><div class="name">'+l.nombre+'</div><div class="num">Lead #'+(idx+1)+' · NSS '+l.nss+' · 📅 '+(l.fnac||"—")+'</div></div>'+viaTag+'</div>'+
      '<div class="cel">📞 '+l.cel+'</div>'+
      '<div class="meta"><b>'+(l.municipio||"—")+'</b> · '+(dir||"sin domicilio")+'<br>CURP: '+l.curp+' · RFC: '+l.rfc+'</div>'+
      '<div class="wabtns">'+
        '<button class="wa iphone" onclick="abrir('+idx+',\'iphone\')">📱 iPhone · 1314</button>'+
        '<button class="wa moto" onclick="abrir('+idx+',\'moto\')">📱 Motorola · 8460</button>'+
      '</div>'+
      '<div class="acc">'+
        '<button class="accbtn msg" onclick="copiarMensaje('+idx+')">💬 Copiar mensaje</button>'+
        '<button class="accbtn hoja" onclick="hojaAmarilla('+idx+')">📋 Hoja amarilla</button>'+
        '<button class="accbtn contacto" onclick="copiarContacto('+idx+')">🏷️ Copiar contacto</button>'+
      '</div>'+
      '<div class="acc"><button class="accbtn cadih" style="background:'+(e.cadih?'#1B3A6B':'#9aa0aa')+'" onclick="toggleCadih('+idx+')">'+(e.cadih?'📑 En CADIH ✓':'📑 Agregar a CADIH')+'</button></div>'+
      '<select onchange="setEstado('+idx+',this.value)">'+opts+'</select>'+
      '<div class="notas">'+notasHtml+'<div class="notaInput"><input id="ni'+idx+'" placeholder="Nueva nota..." onkeydown="if(event.key===\'Enter\')addNota('+idx+')"><button onclick="addNota('+idx+')">Agregar</button></div></div>';
    cont.appendChild(div);
  });
  if(vis===0)cont.innerHTML='<div style="text-align:center;color:#6b7280;padding:30px;font-size:.85rem">No hay leads con este filtro.</div>';
}
function exportarCadih(){
  const sel=[]; LEADS.forEach((l,i)=>{if(st[i]&&st[i].cadih)sel.push(l);});
  if(sel.length===0){toast("No has marcado leads para CADIH");return;}
  let csv="\ufeffNOMBRE COMPLETO,WHATSAPP\n";
  sel.forEach(l=>{csv+='"'+l.nombre.replace(/"/g,'')+'","52'+l.cel+'"\n';});
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="CADIH_Nancy_Jalisco_"+sel.length+"_leads.csv"; a.click();
  toast("Excel CADIH descargado ("+sel.length+" leads)");
}
let toastT;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2200);}
document.getElementById("buscar").addEventListener("input",pinta);
selMsg(1); pinta();
</script>
