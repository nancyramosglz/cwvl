&lt;style&gt;
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 15px; }

/* CALCULADORA */
.calc { max-width: 600px; margin: 0 auto 25px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.calc h2 { font-size: 16px; margin-bottom: 15px; color: #333; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-row.full { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; }
.form-group input, .form-group select { padding: 11px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 6px; margin-bottom: 12px; font-size: 12px; font-weight: bold; display: none; }
.error.show { display: block; }
.btn-generar { width: 100%; padding: 14px; background: #DC5814; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; }

/* PROPUESTA */
.propuesta { display: none; max-width: 750px; background: white; margin: 0 auto; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
.propuesta.show { display: block; }

/* HEADER CON LOGOS REALES */
.header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: white; gap: 10px; }
.header .col { flex: 1; text-align: center; }
.header img.logo { max-width: 100%; height: auto; max-height: 90px; }
.header .divider { width: 1px; height: 80px; background: #ddd; }

/* TÍTULOS */
.titulo-section { background: #1B5E20; color: white; padding: 16px 20px; text-align: center; }
.titulo-main { font-size: 23px; font-weight: bold; letter-spacing: 0.5px; }
.titulo-sub { font-size: 16px; color: #FFB74D; font-weight: bold; margin-top: 4px; }
.badge { background: #DC5814; color: white; padding: 9px; text-align: center; font-size: 12px; font-weight: bold; }

/* CONTENIDO */
.content { padding: 22px; }
.estimado { font-size: 13px; color: #777; margin-bottom: 4px; }
.cliente { font-size: 34px; font-weight: bold; color: #DC5814; margin-bottom: 8px; line-height: 1.1; }
.intro { font-size: 13px; color: #555; margin-bottom: 18px; }

/* OPCIONES */
.opciones { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
.opciones.single { grid-template-columns: 1fr; max-width: 420px; }
.opcion { border: 1px solid #ddd; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.opcion-head { padding: 11px 14px; color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; }
.opcion-head.op1 { background: #0D47A1; }
.opcion-head.op2 { background: #DC5814; }
.opcion-body { padding: 16px 14px; }
.opcion-label { font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
.monto-op1 { font-size: 34px; font-weight: bold; color: #0D47A1; padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
.monto-op2 { font-size: 34px; font-weight: bold; color: #DC5814; padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
.desc-mensual { font-size: 26px; font-weight: bold; color: #DC5814; padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
.fila2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.fila2 .celda .lbl { font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
.fila2 .celda .val { font-size: 22px; font-weight: bold; color: #1B5E20; }
.fila2 .celda .val small { font-size: 12px; }

.disclaimer { background: #FFF8E1; border: 1px solid #FFE082; padding: 11px; border-radius: 8px; margin-bottom: 16px; font-size: 11px; text-align: center; color: #777; }

/* BENEFICIOS */
.beneficios { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; border: 1px solid #eee; border-radius: 8px; padding: 14px 8px; }
.beneficio { text-align: center; font-size: 11px; font-weight: bold; color: #333; }
.beneficio .chk { width: 26px; height: 26px; background: #0D47A1; color: white; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; margin-bottom: 6px; }

/* CTA */
.cta { background: #1B5E20; color: white; padding: 18px; border-radius: 8px; margin-bottom: 18px; display: flex; align-items: center; gap: 14px; }
.cta .icon { font-size: 34px; }
.cta .txt .t1 { font-size: 16px; font-weight: bold; }
.cta .txt .t2 { font-size: 16px; font-weight: bold; color: #FFB74D; }
.cta .txt .t3 { font-size: 12px; color: #C8E6C9; margin-top: 3px; }

/* QUIÉNES SOMOS */
.quienes-title { text-align: center; font-size: 14px; font-weight: bold; color: #1B5E20; margin: 4px 0 14px; }
.quienes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 8px; }
.quien-item { text-align: center; font-size: 10px; color: #666; }
.quien-icon { font-size: 22px; margin-bottom: 5px; }
.quien-num { font-size: 15px; font-weight: bold; color: #DC5814; margin-bottom: 2px; }
.agencia { text-align: center; font-size: 11px; color: #555; margin-bottom: 18px; }

/* QR */
.qr-section { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.qr-box { display: flex; gap: 12px; align-items: center; background: #F0F4FF; border: 1px solid #D6E0F5; border-radius: 8px; padding: 12px; }
.qr-box img { width: 90px; height: 90px; flex-shrink: 0; }
.qr-info .qr-label { font-size: 12px; font-weight: bold; color: #0D47A1; margin-bottom: 4px; }
.qr-info .qr-text { font-size: 10px; color: #666; line-height: 1.4; }
.qr-info .qr-link { font-size: 10px; color: #DC5814; font-weight: bold; margin-top: 3px; }

/* ASESOR */
.asesor-box { background: #FFF3E9; border: 1px solid #F5CBA8; border-radius: 8px; padding: 14px; margin-bottom: 16px; text-align: center; }
.asesor-box .lbl { font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; }
.asesor-box .nombre { font-size: 18px; font-weight: bold; color: #DC5814; margin: 3px 0; }
.asesor-box .tel { font-size: 14px; font-weight: bold; color: #333; }

/* FOOTER */
.footer { background: #1B5E20; color: white; padding: 13px; text-align: center; font-size: 10px; line-height: 1.6; }

/* BOTONES — enlaces reales para que funcionen en iPhone */
.botones { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 18px; background: #f5f5f5; }
.btn-imagen { background: #DC5814; color: white; }
.btn-accion small { font-size: 10px; font-weight: normal; text-transform: none; opacity: 0.9; }
.btn-imagen:active { background: #b8480f; }
@media (max-width: 600px) { .botones { grid-template-columns: 1fr; } }
.btn-accion { display: block; text-align: center; padding: 15px 10px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; text-decoration: none; font-family: Arial, sans-serif; }
.btn-print { background: #28a745; color: white; }
.btn-whats { background: #25D366; color: white; }
.nota-botones { padding: 0 18px 18px; background: #f5f5f5; font-size: 11px; color: #888; text-align: center; }

@media (max-width: 600px) {
    .opciones { grid-template-columns: 1fr; }
    .qr-section { grid-template-columns: 1fr; }
    .beneficios { grid-template-columns: repeat(2, 1fr); }
    .quienes { grid-template-columns: repeat(2, 1fr); }
    .cliente { font-size: 27px; }
    .header img.logo { max-height: 60px; }
}

@media print {
    .calc, .botones, .nota-botones, .error { display: none !important; }
    body { background: white; padding: 0; }
    .propuesta { box-shadow: none; border-radius: 0; max-width: 100%; }
}

&lt;!-- CALCULADORA --&gt;
&lt;div class=&quot;calc&quot;&gt;
    &lt;h2&gt;📊 Crédito Tradicional — Calculadora&lt;/h2&gt;

        &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;Asesor *&lt;/label&gt;&lt;input type=&quot;text&quot; id=&quot;asesor&quot; placeholder=&quot;Nancy Ramos&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;WhatsApp Asesor *&lt;/label&gt;&lt;input type=&quot;tel&quot; id=&quot;whatsapp&quot; placeholder=&quot;8113144902&quot;&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;form-row full&quot;&gt;
        &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;Nombre del Cliente *&lt;/label&gt;&lt;input type=&quot;text&quot; id=&quot;cliente&quot; placeholder=&quot;Juan Carlos Solano Morales&quot;&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;form-row&quot;&gt;
        &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;Pensión Mensual *&lt;/label&gt;&lt;input type=&quot;number&quot; id=&quot;pension&quot; placeholder=&quot;47000&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;Descuentos Actuales&lt;/label&gt;&lt;input type=&quot;number&quot; id=&quot;descuentos&quot; placeholder=&quot;0&quot;&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;form-row&quot;&gt;
        &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;Plazo (meses) *&lt;/label&gt;
            &lt;select id=&quot;plazo&quot;&gt;
                &lt;option value=&quot;&quot;&gt;Selecciona&lt;/option&gt;
                &lt;option value=&quot;12&quot;&gt;12 meses&lt;/option&gt;
                &lt;option value=&quot;24&quot;&gt;24 meses&lt;/option&gt;
                &lt;option value=&quot;36&quot;&gt;36 meses&lt;/option&gt;
                &lt;option value=&quot;48&quot;&gt;48 meses&lt;/option&gt;
                &lt;option value=&quot;60&quot; selected&gt;60 meses&lt;/option&gt;
            &lt;/select&gt;
        &lt;/div&gt;
        &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;CAT (%)&lt;/label&gt;&lt;input type=&quot;number&quot; id=&quot;cat&quot; value=&quot;29.30&quot; step=&quot;0.1&quot;&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;form-row full&quot;&gt;
        &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;Monto Solicitado (0 = solo máximo)&lt;/label&gt;&lt;input type=&quot;number&quot; id=&quot;monto&quot; placeholder=&quot;0&quot;&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;button class=&quot;btn-generar&quot; onclick=&quot;generar()&quot;&gt;GENERAR PROPUESTA&lt;/button&gt;
&lt;/div&gt;

&lt;!-- PROPUESTA --&gt;
&lt;div id=&quot;propuesta&quot; class=&quot;propuesta&quot;&gt;

&lt;script&gt;
function getTM(cat) { return (cat / 29.30) * 0.021645; }
function fac(p, cat) { var tm = getTM(cat); return tm / (1 - Math.pow(1 + tm, -p)); }
function fmt(n) { return &quot;$&quot; + Math.round(n).toLocaleString(&quot;es-MX&quot;); }
function fmtD(n) { return &quot;$&quot; + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, &quot;,&quot;); }
function gv(id) { var e = document.getElementById(id); return e ? (parseFloat(e.value) || 0) : 0; }
function gs(id) { var e = document.getElementById(id); return e ? e.value.trim() : &quot;&quot;; }

function imprimirPropuesta() {
    try {
        window.print();
    } catch(e) {
        alert(&#x27;No se pudo abrir impresión: &#x27; + e.message + &#x27;\n\nAbre este archivo en Safari o Chrome.&#x27;);
    }
}

function compartirImagen() {
    var btn = document.getElementById(&#x27;btn_imagen&#x27;);
    if (typeof html2canvas === &#x27;undefined&#x27;) {
        alert(&#x27;El generador de imagen no cargó. Abre este archivo en Safari o Chrome (no en la vista previa).&#x27;);
        return;
    }
    btn.textContent = &#x27;⏳ Generando...&#x27;;
    btn.disabled = true;
    var propuesta = document.getElementById(&#x27;propuesta&#x27;);

    html2canvas(propuesta, {
        scale: 2,
        useCORS: true,
        backgroundColor: &#x27;#ffffff&#x27;,
        onclone: function(doc) {
            // Ocultar botones y nota en la imagen
            var b = doc.getElementById(&#x27;zona_botones&#x27;);
            if (b) b.style.display = &#x27;none&#x27;;
            var n = doc.querySelector(&#x27;.nota-botones&#x27;);
            if (n) n.style.display = &#x27;none&#x27;;
        }
    }).then(function(canvas) {
        canvas.toBlob(function(blob) {
            var cliente = document.getElementById(&#x27;prop_cliente&#x27;).textContent.replace(/\s+/g, &#x27;_&#x27;);
            var nombreArchivo = &#x27;Cotizacion_&#x27; + cliente + &#x27;.png&#x27;;

            function restaurar() {
                btn.innerHTML = &#x27;📷 ENVIAR PROPUESTA&lt;br&gt;&lt;small&gt;(imagen por WhatsApp)&lt;/small&gt;&#x27;;
                btn.disabled = false;
            }

            try {
                var file = new File([blob], nombreArchivo, { type: &#x27;image/png&#x27; });
                if (navigator.canShare &amp;&amp; navigator.canShare({ files: [file] })) {
                    // iPhone/Android: menu nativo de compartir -&gt; WhatsApp adjunta la imagen
                    navigator.share({ files: [file], title: &#x27;Cotización CWVL&#x27; })
                        .then(restaurar).catch(restaurar);
                    return;
                }
            } catch(e) {}

            // Fallback: mostrar imagen en pantalla completa para guardar manualmente
            var url = URL.createObjectURL(blob);
            var win = window.open(&#x27;&#x27;);
            if (win) {
                win.document.write(&#x27;&lt;html&gt;&lt;head&gt;&lt;title&gt;&#x27; + nombreArchivo + &#x27;&lt;/title&gt;&lt;/head&gt;&lt;body style=&quot;margin:0;background:#333;text-align:center;&quot;&gt;&lt;p style=&quot;color:white;font-family:Arial;padding:10px;&quot;&gt;Mantén presionada la imagen → Guardar imagen → compártela por WhatsApp&lt;/p&gt;&lt;img src=&quot;&#x27; + url + &#x27;&quot; style=&quot;max-width:100%;&quot;&gt;&lt;/body&gt;&lt;/html&gt;&#x27;);
            } else {
                // Ultimo recurso: descarga directa
                var a = document.createElement(&#x27;a&#x27;);
                a.href = url;
                a.download = nombreArchivo;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
            restaurar();
        }, &#x27;image/png&#x27;);
    }).catch(function(e) {
        alert(&#x27;Error al generar imagen: &#x27; + e.message);
        btn.innerHTML = &#x27;📷 ENVIAR PROPUESTA&lt;br&gt;&lt;small&gt;(imagen por WhatsApp)&lt;/small&gt;&#x27;;
        btn.disabled = false;
    });
}

function cardOpcion(num, titulo, claseHead, claseMonto, montoVal, descVal, plazo, cat) {
    return &#x27;&lt;div class=&quot;opcion&quot;&gt;&#x27; +
        &#x27;&lt;div class=&quot;opcion-head &#x27; + claseHead + &#x27;&quot;&gt;OPCIÓN &#x27; + num + &#x27; | &#x27; + titulo + &#x27;&lt;/div&gt;&#x27; +
        &#x27;&lt;div class=&quot;opcion-body&quot;&gt;&#x27; +
        &#x27;&lt;div class=&quot;opcion-label&quot;&gt;Total Préstamo&lt;/div&gt;&#x27; +
        &#x27;&lt;div class=&quot;&#x27; + claseMonto + &#x27;&quot;&gt;&#x27; + fmt(montoVal) + &#x27;&lt;/div&gt;&#x27; +
        &#x27;&lt;div class=&quot;opcion-label&quot;&gt;Descuento Mensual&lt;/div&gt;&#x27; +
        &#x27;&lt;div class=&quot;desc-mensual&quot;&gt;&#x27; + fmtD(descVal) + &#x27;&lt;/div&gt;&#x27; +
        &#x27;&lt;div class=&quot;fila2&quot;&gt;&#x27; +
        &#x27;&lt;div class=&quot;celda&quot;&gt;&lt;div class=&quot;lbl&quot;&gt;Plazo&lt;/div&gt;&lt;div class=&quot;val&quot;&gt;&#x27; + plazo + &#x27; &lt;small&gt;MESES&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;&#x27; +
        &#x27;&lt;div class=&quot;celda&quot;&gt;&lt;div class=&quot;lbl&quot;&gt;CAT&lt;/div&gt;&lt;div class=&quot;val&quot;&gt;&#x27; + cat.toFixed(2) + &#x27;%&lt;/div&gt;&lt;/div&gt;&#x27; +
        &#x27;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&#x27;;
}

function generar() {
    var err = document.getElementById(&#x27;error&#x27;);
    err.classList.remove(&#x27;show&#x27;);

    var asesor = gs(&#x27;asesor&#x27;);
    var whats = gs(&#x27;whatsapp&#x27;).replace(/\D/g, &#x27;&#x27;);
    var cliente = gs(&#x27;cliente&#x27;);
    var pension = gv(&#x27;pension&#x27;);
    var desc = gv(&#x27;descuentos&#x27;);
    var plazo = parseInt(gs(&#x27;plazo&#x27;)) || 0;
    var cat = gv(&#x27;cat&#x27;);
    var monto = gv(&#x27;monto&#x27;);

    if (!asesor || !whats || !cliente || pension &lt;= 0 || plazo === 0) {
        err.textContent = &#x27;⚠️ Completa: asesor, WhatsApp, cliente, pensión y plazo&#x27;;
        err.classList.add(&#x27;show&#x27;);
        return;
    }

    var cap = pension * 0.30;
    var disp = cap - desc;

    if (disp &lt;= 0) {
        err.textContent = &#x27;⚠️ No hay capacidad disponible (descuentos superan el 30% de la pensión)&#x27;;
        err.classList.add(&#x27;show&#x27;);
        return;
    }

    var html = &#x27;&#x27;;
    var op1_monto = disp / fac(plazo, cat);

    if (monto &gt; 0) {
        var op2_desc = monto * fac(plazo, cat);
        if (op2_desc &gt; disp) {
            err.textContent = &#x27;⚠️ El monto solicitado excede la capacidad disponible&#x27;;
            err.classList.add(&#x27;show&#x27;);
            return;
        }
        html = cardOpcion(1, &#x27;MÁXIMO DISPONIBLE&#x27;, &#x27;op1&#x27;, &#x27;monto-op1&#x27;, op1_monto, disp, plazo, cat);
        html += cardOpcion(2, &#x27;MONTO SOLICITADO&#x27;, &#x27;op2&#x27;, &#x27;monto-op2&#x27;, monto, op2_desc, plazo, cat);
        document.getElementById(&#x27;prop_intro&#x27;).textContent = &#x27;Le presentamos 2 opciones según su capacidad de pago:&#x27;;
        document.getElementById(&#x27;prop_opciones&#x27;).className = &#x27;opciones&#x27;;
    } else {
        html = cardOpcion(1, &#x27;MÁXIMO DISPONIBLE&#x27;, &#x27;op1&#x27;, &#x27;monto-op1&#x27;, op1_monto, disp, plazo, cat);
        document.getElementById(&#x27;prop_intro&#x27;).textContent = &#x27;Le presentamos 1 opción según su capacidad de pago:&#x27;;
        document.getElementById(&#x27;prop_opciones&#x27;).className = &#x27;opciones single&#x27;;
    }

    document.getElementById(&#x27;prop_cliente&#x27;).textContent = cliente;
    document.getElementById(&#x27;prop_asesor&#x27;).textContent = asesor;
    document.getElementById(&#x27;prop_wa&#x27;).textContent = whats;
    document.getElementById(&#x27;prop_opciones&#x27;).innerHTML = html;

    // Botón WhatsApp: propuesta completa explicada en texto
    var txt = &#x27;Hola *&#x27; + cliente + &#x27;*\n\n&#x27;;
    txt += &#x27;Le comparto su *COTIZACION PERSONALIZADA* de Credito Tradicional del programa &quot;Tu prestamo Facil y Seguro&quot; del IMSS, respaldado por *Banco INBURSA*.\n\n&#x27;;
    txt += &#x27;------------------------------\n&#x27;;
    txt += &#x27;*OPCION 1 | MAXIMO DISPONIBLE*\n&#x27;;
    txt += &#x27;- Total prestamo: *&#x27; + fmt(op1_monto) + &#x27;*\n&#x27;;
    txt += &#x27;- Descuento mensual: &#x27; + fmtD(disp) + &#x27;\n&#x27;;
    txt += &#x27;- Plazo: &#x27; + plazo + &#x27; meses\n&#x27;;
    txt += &#x27;- CAT: &#x27; + cat.toFixed(2) + &#x27;%\n&#x27;;
    if (monto &gt; 0) {
        var op2d = monto * fac(plazo, cat);
        txt += &#x27;\n*OPCION 2 | MONTO SOLICITADO*\n&#x27;;
        txt += &#x27;- Total prestamo: *&#x27; + fmt(monto) + &#x27;*\n&#x27;;
        txt += &#x27;- Descuento mensual: &#x27; + fmtD(op2d) + &#x27;\n&#x27;;
        txt += &#x27;- Plazo: &#x27; + plazo + &#x27; meses\n&#x27;;
        txt += &#x27;- CAT: &#x27; + cat.toFixed(2) + &#x27;%\n&#x27;;
    }
    txt += &#x27;------------------------------\n\n&#x27;;
    txt += &#x27;*Beneficios:*\n&#x27;;
    txt += &#x27;- Sin aval ni garantias\n&#x27;;
    txt += &#x27;- Sin comision por apertura\n&#x27;;
    txt += &#x27;- Sin revision de buro\n&#x27;;
    txt += &#x27;- Tasa fija todo el plazo\n\n&#x27;;
    txt += &#x27;El descuento se aplica directamente a su pension, sin tramites complicados.\n\n&#x27;;
    txt += &#x27;_Ejemplo ilustrativo. Monto final sujeto a perfil y aprobacion de credito._\n\n&#x27;;
    txt += &#x27;Si desea avanzar con su tramite, quedo a sus ordenes.\n\n&#x27;;
    txt += &#x27;*&#x27; + asesor + &#x27;*\n&#x27;;
    txt += &#x27;CWVL Consultoria Nuevo Leon\n&#x27;;
    txt += &#x27;Vigilado y monitoreado por el IMSS&#x27;;
    document.getElementById(&#x27;btn_whats&#x27;).href = &#x27;https://wa.me/52&#x27; + whats + &#x27;?text=&#x27; + encodeURIComponent(txt);

    document.getElementById(&#x27;propuesta&#x27;).classList.add(&#x27;show&#x27;);
    setTimeout(function() { document.getElementById(&#x27;propuesta&#x27;).scrollIntoView({behavior: &#x27;smooth&#x27;}); }, 100);
}
&lt;/script&gt;

.baz:active{transform:scale(.97);}
.bwp{background:#25D366;color:white;border:none;border-radius:12px;padding:12px;font-size:12px;font-weight:700;font-family:Montserrat,sans-serif;cursor:pointer;flex:1;}
.bcp{background:#128C7E;color:white;border:none;border-radius:12px;padding:12px;font-size:12px;font-weight:700;font-family:Montserrat,sans-serif;cursor:pointer;flex:1;}
.bnva{width:100%;padding:14px;background:transparent;color:var(--n);border:2px solid var(--n);border-radius:var(--rd);font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;cursor:pointer;margin-top:10px;}
.benvs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.errmsg{background:#FFEBEE;border:1px solid #FFCDD2;border-radius:10px;padding:12px;color:#C62828;font-size:13px;font-weight:600;margin-bottom:10px;display:none;}
.errmsg.vis{display:block;}
.res{display:none;}
.res.vis{display:block;animation:fu .4s ease;}
@keyframes fu{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.rsm{background:linear-gradient(135deg,#1A1A1A,#333);border-radius:var(--rd);padding:16px;margin-bottom:14px;}
.rsm h3{font-family:Montserrat,sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:12px;letter-spacing:.5px;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rl{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:2px;}
.rv{font-family:Montserrat,sans-serif;font-weight:800;font-size:16px;color:white;}
.rv.ac{color:var(--n2);}
.oc{border-radius:var(--rd);margin-bottom:14px;overflow:hidden;box-shadow:var(--sh);}
.oh{padding:14px 16px;display:flex;align-items:center;gap:10px;}
.onum{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-family:Montserrat,sans-serif;font-weight:900;font-size:21px;color:white;flex-shrink:0;}
.oht h3{font-family:Montserrat,sans-serif;font-weight:800;font-size:15px;color:white;line-height:1.2;}
.oht p{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px;}
.oico{margin-left:auto;font-size:28px;}
.ob{background:white;padding:16px;}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.di{background:var(--gr);border-radius:11px;padding:11px 13px;}
.dl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.dv{font-size:18px;font-weight:700;font-family:Montserrat,sans-serif;}
.abox{border-radius:12px;padding:11px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:center;}
.aico{font-size:24px;flex-shrink:0;}
.albl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.aval{font-family:Montserrat,sans-serif;font-weight:900;font-size:18px;}
.nota{background:#FFF8F0;border:1px solid #FFCCAA;border-radius:11px;padding:10px 13px;font-size:12px;color:#555;margin:10px 0;}
.op1 .oh{background:linear-gradient(135deg,#DC5814,#FF8C00);}
.op1 .abox{background:#FFF3E0;}.op1 .albl{color:#E65100;}.op1 .aval{color:#DC5814;}
.op2 .oh{background:linear-gradient(135deg,#1B5E20,#43A047);}
.op2 .abox{background:#E8F5E9;}.op2 .albl{color:#1B5E20;}.op2 .aval{color:#1B5E20;}
.op3 .oh{background:linear-gradient(135deg,#1565C0,#42A5F5);}
.op3 .abox{background:#E3F2FD;}.op3 .albl{color:#1565C0;}.op3 .aval{color:#1565C0;}
.op4 .oh{background:linear-gradient(135deg,#6A1B9A,#AB47BC);}
.op4 .abox{background:#F3E5F5;}.op4 .albl{color:#6A1B9A;}.op4 .aval{color:#6A1B9A;}
.pgbdg{display:inline-block;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;font-family:Montserrat,sans-serif;margin-top:6px;}
.pgok{background:#E8F5E9;color:#1B5E20;}.pgno{background:#FFEBEE;color:#C62828;}
.reqcard{background:linear-gradient(135deg,#0D47A1,#1565C0);border-radius:var(--rd);padding:20px;margin-bottom:14px;box-shadow:var(--sh);}
.reqtit{font-family:Montserrat,sans-serif;font-weight:900;font-size:17px;color:white;margin-bottom:14px;text-align:center;text-transform:uppercase;letter-spacing:1px;}
.reqst{font-family:Montserrat,sans-serif;font-weight:800;font-size:12px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:14px;}
.reqit{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px;}
.reqchk{width:26px;height:26px;border-radius:50%;background:var(--n);display:flex;align-items:center;justify-content:center;font-size:13px;color:white;font-weight:900;flex-shrink:0;margin-top:1px;}
.reqtxt{font-size:13px;color:white;line-height:1.5;}
.reqtxt strong{font-weight:700;}
.reqtxt small{font-size:11px;opacity:.8;display:block;margin-top:2px;}
.ftcard{background:var(--ne);border-radius:var(--rd);padding:16px;text-align:center;margin-top:8px;}
.ftcard p{color:rgba(255,255,255,.55);font-size:12px;line-height:1.8;}
.ftcard strong{color:rgba(255,255,255,.88);}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;overflow-y:auto;padding:16px;flex-direction:column;align-items:center;}
.modal.vis{display:flex;}
.mclose{background:white;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;margin-bottom:10px;font-weight:900;align-self:flex-end;flex-shrink:0;}
.mimg{max-width:100%;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:500px;margin-top:12px;}
.mbtn{padding:15px;border:none;border-radius:14px;font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;gap:8px;}
.mdl{background:linear-gradient(135deg,var(--n),var(--n2));}
.mwp{background:#25D366;}
.opchip{border:2px solid #6A1B9A;background:white;color:#6A1B9A;border-radius:20px;padding:9px 14px;font-family:Montserrat,sans-serif;font-weight:800;font-size:12px;cursor:pointer}
.opchip.opon{background:#6A1B9A;color:white}
.opchip.opoff{opacity:.45}
&lt;/style&gt;
&lt;/head&gt;

  inbursa:[&quot;CONSUBANC&quot;,&quot;CONSUPAGO&quot;,&quot;OPCIPRES&quot;,&quot;MAS NOMINA&quot;,&quot;FISOFO&quot;,&quot;PAGUITOS&quot;,&quot;CI BANCO&quot;],
  bancrea:[&quot;ATTENDO&quot;,&quot;GFI APOYO&quot;,&quot;DIMEX&quot;,&quot;CI BANCO&quot;],
  multiva:[&quot;CI BANCO&quot;]
};
var EDADCON={inbursa:74,bancrea:79,multiva:77};
var MONTOSB={inbursa:{min:3000,max:650000},bancrea:{min:4000,max:1000000},multiva:{min:10000,max:700000}};
// bajo = CAT cuando el prestamo es GRANDE (&gt;=$100k) | alto = CAT cuando el prestamo es CHICO (&lt;$100k)
var CATSB={inbursa:{bajo:29.30,alto:29.30},bancrea:{bajo:30.50,alto:34.50},multiva:{bajo:29.46,alto:33.18}};
var EDADMAX={inbursa:79,bancrea:84,multiva:82};
var BNOMS={inbursa:&quot;Banco INBURSA&quot;,bancrea:&quot;Banco BANCREA&quot;,multiva:&quot;Banco MULTIVA&quot;};
var TITS=[&quot;&quot;,&quot;MAXIMO DINERO&quot;,&quot;MISMO DESCUENTO&quot;,&quot;SOLO DEUDA 60M&quot;,&quot;SOLO DEUDA BAJAR PLAZO&quot;];

var banco=&quot;&quot;,dat={},ops=[],dataUrl=&quot;&quot;,NDE=1,MRA=[0,0,0,0,0],CAPRA=[0,0,0,0,0],selOps={1:true,2:true,3:true,4:true};

function gv(id){var el=document.getElementById(id);return el?(parseFloat(el.value)||0):0;}
function gs(id){var el=document.getElementById(id);return el?(el.value.trim()):&quot;&quot;;}
function fmt(n){return &quot;$&quot;+Math.round(n).toLocaleString(&quot;es-MX&quot;);}
function fmtD(n){
  var s=n.toFixed(2);
  var parts=s.split(&quot;.&quot;);
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,&quot;,&quot;);
  return &quot;$&quot;+parts.join(&quot;.&quot;);
}
function getTM(cat){return(cat/29.30)*0.021645;}
function fac(p,cat){var tm=getTM(cat);return tm/(1-Math.pow(1+tm,-p));}

function nL(n){
  var u=[&quot;&quot;,&quot;UN&quot;,&quot;DOS&quot;,&quot;TRES&quot;,&quot;CUATRO&quot;,&quot;CINCO&quot;,&quot;SEIS&quot;,&quot;SIETE&quot;,&quot;OCHO&quot;,&quot;NUEVE&quot;,&quot;DIEZ&quot;,&quot;ONCE&quot;,&quot;DOCE&quot;,&quot;TRECE&quot;,&quot;CATORCE&quot;,&quot;QUINCE&quot;,&quot;DIECISEIS&quot;,&quot;DIECISIETE&quot;,&quot;DIECIOCHO&quot;,&quot;DIECINUEVE&quot;];
  var d=[&quot;&quot;,&quot;&quot;,&quot;VEINTE&quot;,&quot;TREINTA&quot;,&quot;CUARENTA&quot;,&quot;CINCUENTA&quot;,&quot;SESENTA&quot;,&quot;SETENTA&quot;,&quot;OCHENTA&quot;,&quot;NOVENTA&quot;];
  n=Math.round(n);
  if(n&gt;=1e6)return nL(Math.floor(n/1e6))+&quot; MILLON&quot;+(Math.floor(n/1e6)&gt;1?&quot;ES&quot;:&quot;&quot;)+(n%1e6?&quot; &quot;+nL(n%1e6):&quot;&quot;);
  if(n&gt;=1000){var m=Math.floor(n/1000),r=n%1000;return(m===1?&quot;MIL&quot;:nL(m)+&quot; MIL&quot;)+(r?&quot; &quot;+nL(r):&quot;&quot;);}
  if(n&gt;=100){var c=[&quot;&quot;,&quot;CIEN&quot;,&quot;DOSCIENTOS&quot;,&quot;TRESCIENTOS&quot;,&quot;CUATROCIENTOS&quot;,&quot;QUINIENTOS&quot;,&quot;SEISCIENTOS&quot;,&quot;SETECIENTOS&quot;,&quot;OCHOCIENTOS&quot;,&quot;NOVECIENTOS&quot;],h=Math.floor(n/100),r2=n%100;return(n===100?&quot;CIEN&quot;:c[h])+(r2?&quot; &quot;+nL(r2):&quot;&quot;);}
  if(n&gt;=20){var dz=Math.floor(n/10),u2=n%10;return d[dz]+(u2?&quot; Y &quot;+u[u2]:&quot;&quot;);}
  return u[n]||&quot;&quot;;
}

function validar(){
  var edad=gv(&quot;edad&quot;);
  var fins=[];
  for(var n=1;n&lt;=NDE;n++){var f=gs(&quot;fin&quot;+n);if(f)fins.push(f);}
  var vc=document.getElementById(&quot;val-card&quot;);
  if(fins.length===0&amp;&amp;!edad){vc.style.display=&quot;none&quot;;return;}
  vc.style.display=&quot;block&quot;;
  var bancos=[&quot;inbursa&quot;,&quot;bancrea&quot;,&quot;multiva&quot;];
  bancos.forEach(function(bk){
    var el=document.getElementById(&quot;v-&quot;+bk);
    var det=document.getElementById(&quot;v-&quot;+bk+&quot;-d&quot;);
    var bdg=document.getElementById(&quot;bdg-&quot;+bk);
    var btn=document.getElementById(&quot;b-&quot;+bk);
    if(!el)return;
    var est=&quot;ok&quot;,msgs=[];
    fins.forEach(function(f,ix){
      var compra=gs(&quot;comp&quot;+(ix+1))!==&quot;0&quot;;
      if(compra&amp;&amp;NOCOMPRA[bk].indexOf(f)&gt;=0){est=&quot;no&quot;;msgs.push(&quot;No compra &quot;+f);}
    });
    if(edad&gt;0&amp;&amp;edad&gt;EDADCON[bk]){est=&quot;no&quot;;msgs.push(&quot;Edad maxima &quot;+EDADCON[bk]+&quot; anos&quot;);}
    else if(edad&gt;0&amp;&amp;(edad+5)&gt;EDADMAX[bk]){est=&quot;no&quot;;msgs.push(&quot;Excede edad fin de credito (&quot;+EDADMAX[bk]+&quot;)&quot;);}
    if(est===&quot;ok&quot;)msgs.push(&quot;Aplica | &quot;+(edad&gt;0?&quot;Edad OK (max &quot;+EDADCON[bk]+&quot;)&quot;:&quot;&quot;)+&quot; Montos &quot;+fmt(MONTOSB[bk].min)+&quot; a &quot;+fmt(MONTOSB[bk].max));
    el.className=&quot;vbox &quot;+(est===&quot;ok&quot;?&quot;vok&quot;:est===&quot;no&quot;?&quot;vno&quot;:&quot;vwn&quot;);
    el.querySelector(&quot;.vico&quot;).textContent=est===&quot;ok&quot;?&quot;OK&quot;:est===&quot;no&quot;?&quot;NO&quot;:&quot;!&quot;;
    det.textContent=msgs.join(&quot; | &quot;);
    bdg.className=&quot;bbadge &quot;+(est===&quot;ok&quot;?&quot;bok&quot;:est===&quot;no&quot;?&quot;bno&quot;:&quot;bwn&quot;);
    bdg.textContent=est===&quot;ok&quot;?&quot;OK&quot;:est===&quot;no&quot;?&quot;NO&quot;:&quot;!&quot;;
    btn.className=&quot;bbtn&quot;+(est===&quot;no&quot;?&quot; dis&quot;:est===&quot;warn&quot;?&quot; warn&quot;:&quot;&quot;);
  });
}

function calcMeses(d){
  var m=gv(&quot;mens&quot;+d),s=gv(&quot;saldo&quot;+d),cat=gv(&quot;cat&quot;+d)||41.5;
  if(m&gt;0&amp;&amp;s&gt;0){
    var meses=Math.round(s/m);
    var tm=getTM(cat);
    var capReal=m*(1-Math.pow(1+tm,-meses))/tm;
    MRA[d]=meses;CAPRA[d]=capReal;
    document.getElementById(&quot;mh&quot;+d).textContent=
      &quot;Plazo restante: &quot;+meses+&quot;m | Capital real: $&quot;+Math.round(capReal).toLocaleString(&quot;es-MX&quot;);
  }
  actualizarDeudas();
}

  el.innerHTML=&quot;&lt;span class=&#x27;pgbdg &quot;+(ok?&quot;pgok&quot;:&quot;pgno&quot;)+&quot;&#x27;&gt;&quot;+(ok?&quot;Cumple &quot;+meses+&quot; pagos - APLICA&quot;:&quot;Faltan &quot;+(24-meses)+&quot; pagos para los 24&quot;)+&quot;&lt;/span&gt;&quot;;
}

function catFor(monto){

  if(banco&amp;&amp;CATSB[banco])return monto&gt;=100000?CATSB[banco].bajo:CATSB[banco].alto;

}

function calcular(){
  var nom=gs(&quot;nom&quot;),tel=gs(&quot;tel&quot;),edad=gv(&quot;edad&quot;);
  var neta=gv(&quot;pneta&quot;);
  var cap30=neta*0.30;
  var err=document.getElementById(&quot;errmsg&quot;);

  // Recolectar deudas activas
  var deudasComp=[],deudasPerm=[];
  var capital=0,descAct=0,capitalReal=0,mensPerm=0;
  var sumCatPond=0,mrMax=0;
  for(var n=1;n&lt;=NDE;n++){
    var f=gs(&quot;fin&quot;+n),s=gv(&quot;saldo&quot;+n),m=gv(&quot;mens&quot;+n),c=gv(&quot;cat&quot;+n)||41.5;
    if(s&lt;=0&amp;&amp;m&lt;=0)continue;
    var compra=gs(&quot;comp&quot;+n)!==&quot;0&quot;;
    var capR=CAPRA[n]&gt;0?CAPRA[n]:s;
    if(compra){
      deudasComp.push({fin:f||(&quot;DEUDA &quot;+n),s:s,m:m,cat:c,capR:capR});
      capital+=s;descAct+=m;capitalReal+=capR;
      sumCatPond+=c*capR;
      if(MRA[n]&gt;mrMax)mrMax=MRA[n];
    }else{
      deudasPerm.push({fin:f||(&quot;DEUDA &quot;+n),s:s,m:m});
      mensPerm+=m;
    }
  }

  if(!nom||neta&lt;=0||deudasComp.length===0||capital&lt;=0||descAct&lt;=0||!banco){
    err.textContent=&quot;Completa: nombre, pension neta, al menos una deuda que SE COMPRA y selecciona financiera.&quot;;
    err.classList.add(&quot;vis&quot;);return;
  }
  err.classList.remove(&quot;vis&quot;);

  if(capitalReal&lt;=0)capitalReal=capital;

  // Capacidad disponible: 30% neta menos lo que permanece
  var capDisp=cap30-mensPerm;
  if(capDisp&lt;=0){
    err.textContent=&quot;Las deudas que permanecen consumen toda la capacidad del 30%.&quot;;
    err.classList.add(&quot;vis&quot;);return;
  }

  // Plazo restante redondeado a plazo valido IMSS
  var mr=mrMax&gt;0?mrMax:(Math.round(capital/descAct)||36);
  // mrReal = plazo restante REAL del cliente (sin redondear), para calcular intereses viejos
  var mrReal=mr;
  // mr = redondeado al siguiente plazo IMSS válido (para OP4)
  var plazosValidos=[12,24,36,48,60];
  var mrValido=60;
  for(var pi=0;pi&lt;plazosValidos.length;pi++){
    if(plazosValidos[pi]&gt;=mr){mrValido=plazosValidos[pi];break;}
  }
  mr=mrValido;

  // CAT viejo ponderado por capital real
  var catV=sumCatPond&gt;0?sumCatPond/capitalReal:41.5;

  function ahoReal(cap,cv,cn,p){
    var tmV=getTM(cv),tmN=getTM(cn);
    var mensV=cap*fac(p,cv),mensN=cap*fac(p,cn);
    var intV=mensV*p-cap,intN=mensN*p-cap;
    return Math.max(0,intV-intN);
  }

  // CAT por opcion segun monto (auto) - iterando la circularidad en OP1/OP2
  function resolverOpcion(base,plazo){
    // Resuelve el &quot;huevo y la gallina&quot;: el monto depende del CAT y el CAT depende del monto
    // Probamos primero con CAT bajo (monto grande). Si el monto resultante es &gt;=100k, se queda.
    // Si no, repetimos con CAT alto (monto chico).
    var catBajo=catFor(100000),catAlto=catFor(0);
    var t=base/fac(plazo,catBajo);
    if(t&gt;=100000)return {tot:t,cat:catBajo};
    t=base/fac(plazo,catAlto);
    return {tot:t,cat:catAlto};
  }

  // Limite de monto del banco
  var maxB=MONTOSB[banco]?MONTOSB[banco].max:Infinity;
  var minB=MONTOSB[banco]?MONTOSB[banco].min:0;

  // OP1: maximo dinero con capacidad disponible
  var r1=resolverOpcion(capDisp,60);
  var o1={tot:r1.tot,deu:capitalReal,pla:60,cat:r1.cat,lim:false};
  if(o1.tot&gt;maxB){o1.tot=maxB;o1.cat=catFor(o1.tot);o1.lim=true;}
  o1.des=o1.tot*fac(60,o1.cat);
  o1.rem=Math.max(0,o1.tot-capitalReal);
  o1.aho=ahoReal(capitalReal,catV,o1.cat,mrReal);

  // OP2: mismo descuento que hoy (solo compradas)
  var r2=resolverOpcion(descAct,60);
  var o2={tot:r2.tot,deu:capitalReal,pla:60,cat:r2.cat,lim:false};
  if(o2.tot&gt;maxB){o2.tot=maxB;o2.cat=catFor(o2.tot);o2.lim=true;}
  o2.des=o2.tot*fac(60,o2.cat);
  o2.rem=Math.max(0,o2.tot-capitalReal);
  o2.aho=ahoReal(capitalReal,catV,o2.cat,mrReal);

  // OP3: solo deuda a 60m
  var c3=catFor(capitalReal);
  var o3={tot:capitalReal,deu:capitalReal,pla:60,rem:0,cat:c3,lim:capitalReal&gt;maxB};
  o3.des=capitalReal*fac(60,c3);o3.aho=ahoReal(capitalReal,catV,c3,mrReal);

  // OP4: BAJAR PLAZO - siempre menor a 60 meses (distinta a OP3)
  var pla4=mr&lt;60?mr:48;
  var c4=catFor(capitalReal);
  var o4={tot:capitalReal,deu:capitalReal,pla:pla4,rem:0,cat:c4,lim:capitalReal&gt;maxB};
  o4.des=capitalReal*fac(pla4,c4);o4.aho=ahoReal(capitalReal,catV,c4,mrReal);

  ops=[null,o1,o2,o3,o4];
  var catN=o1.cat;
  dat={nom:nom,tel:tel,capital:capital,descAct:descAct,catN:catN,catV:catV,
       deudasComp:deudasComp,deudasPerm:deudasPerm,mensPerm:mensPerm,capDisp:capDisp,
       fin1:deudasComp[0]?deudasComp[0].fin:&quot;&quot;,s1:deudasComp[0]?deudasComp[0].s:0,m1:deudasComp[0]?deudasComp[0].m:0,
       fin2:deudasComp[1]?deudasComp[1].fin:&quot;&quot;,s2:deudasComp[1]?deudasComp[1].s:0,m2:deudasComp[1]?deudasComp[1].m:0,
       banco:BNOMS[banco],bkey:banco,capitalReal:capitalReal,asesorNom:gs(&quot;asesor-nom&quot;),asesorTel:gs(&quot;asesor-tel&quot;)};

  document.getElementById(&quot;r-nom&quot;).textContent=nom;
  document.getElementById(&quot;r-cap&quot;).textContent=fmt(capital)+&quot; | Capital real: &quot;+fmt(capitalReal);
  document.getElementById(&quot;r-da&quot;).textContent=fmtD(descAct);
  document.getElementById(&quot;r-bco&quot;).textContent=dat.banco;
  document.getElementById(&quot;ft-bco&quot;).textContent=dat.banco+&quot; | CAT segun monto&quot;;

  [1,2,3,4].forEach(function(i){
    var o=ops[i];
    document.getElementById(&quot;o&quot;+i+&quot;tot&quot;).textContent=fmt(o.tot);
    document.getElementById(&quot;o&quot;+i+&quot;deu&quot;).textContent=fmt(o.deu);
    document.getElementById(&quot;o&quot;+i+&quot;des&quot;).textContent=fmtD(o.des);
    document.getElementById(&quot;o&quot;+i+&quot;cat&quot;).textContent=o.cat.toFixed(2)+&quot;%&quot;;
    document.getElementById(&quot;o&quot;+i+&quot;aho&quot;).textContent=fmt(o.aho);
    document.getElementById(&quot;o&quot;+i+&quot;pla&quot;).textContent=o.pla+&quot; meses&quot;;
    if(i&lt;=2)document.getElementById(&quot;o&quot;+i+&quot;rem&quot;).textContent=fmt(o.rem);
    var baja=descAct-o.des;
    var bajaTxt;
    if(baja&gt;0){
      bajaTxt=fmtD(descAct)+&quot; a &quot;+fmtD(o.des)+&quot; (ahorra &quot;+fmtD(baja)+&quot;/mes)&quot;;
    } else if(baja&lt;0){
      bajaTxt=fmtD(descAct)+&quot; a &quot;+fmtD(o.des)+&quot; (sube &quot;+fmtD(Math.abs(baja))+&quot;/mes)&quot;;
    } else {
      bajaTxt=&quot;Sin cambio: &quot;+fmtD(descAct);
    }
    document.getElementById(&quot;o&quot;+i+&quot;baj&quot;).textContent=bajaTxt;
  });

  var res=document.getElementById(&quot;res&quot;);
  res.classList.add(&quot;vis&quot;);
  setTimeout(function(){res.scrollIntoView({behavior:&quot;smooth&quot;,block:&quot;start&quot;});},300);
}

function msg(op){

function loadImg(src){return new Promise(function(r){var i=new Image();i.onload=function(){r(i);};i.src=src;});}
function rr(ctx,x,y,w,h,r,fi,st){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();if(fi)ctx.fill();if(st)ctx.stroke();
}

  return Promise.all([loadImg(IMGS.cwvl),loadImg(IMGS[dat.bkey]),loadImg(IMGS.imss),loadImg(IMGS.qr)]).then(function(im){
    var lC=im[0],lB=im[1],lIm=im[2],lQ=im[3];
    var W=1080,cv=document.getElementById(&quot;cv&quot;);
    cv.width=W;cv.height=3000;
    var ctx=cv.getContext(&quot;2d&quot;),d=dat;
    ctx.fillStyle=&quot;#FFF&quot;;ctx.fillRect(0,0,W,3000);

    var y=0; // cursor vertical

    // ── LOGOS HEADER ─────────────────────────────────
    ctx.fillStyle=&quot;#FFF&quot;;ctx.fillRect(0,y,W,200);
    ctx.strokeStyle=&quot;#EEEEEE&quot;;ctx.lineWidth=1;ctx.strokeRect(0,y,W,200);
    // CWVL izquierda
    var cS=Math.min(200/lC.width,160/lC.height);
    ctx.drawImage(lC,30,y+(200-lC.height*cS)/2,lC.width*cS,lC.height*cS);
    // Separadores
    ctx.strokeStyle=&quot;#DDDDDD&quot;;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(270,y+20);ctx.lineTo(270,y+180);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W-270,y+20);ctx.lineTo(W-270,y+180);ctx.stroke();
    // IMSS centro
    var iS=Math.min(300/lIm.width,160/lIm.height);
    ctx.drawImage(lIm,(W-lIm.width*iS)/2,y+(200-lIm.height*iS)/2,lIm.width*iS,lIm.height*iS);
    // Banco derecha
    var bS=Math.min(240/lB.width,150/lB.height);
    ctx.drawImage(lB,W-30-lB.width*bS,y+(200-lB.height*bS)/2,lB.width*bS,lB.height*bS);
    y+=200;

    // ── BANNER MORADO ─────────────────────────────────
    ctx.fillStyle=&quot;#5E35B1&quot;;ctx.fillRect(0,y,W,84);
    ctx.fillStyle=&quot;#FFF&quot;;ctx.font=&quot;bold 50px Arial&quot;;ctx.textAlign=&quot;center&quot;;
    var _sel=getSelOps();
    ctx.fillText(_sel.length===1?&quot;RESUMEN · SU MEJOR OPCION&quot;:&quot;RESUMEN · LAS &quot;+_sel.length+&quot; OPCIONES&quot;,W/2,y+56);
    y+=84;

    // ── PILL NARANJA ──────────────────────────────────
    ctx.fillStyle=&quot;#E65100&quot;;
    ctx.beginPath();ctx.roundRect(70,y+14,W-140,60,30);ctx.fill();
    ctx.fillStyle=&quot;rgba(255,255,255,0.2)&quot;;ctx.beginPath();ctx.arc(120,y+44,24,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=&quot;#FFF&quot;;ctx.font=&quot;bold 26px Arial&quot;;ctx.textAlign=&quot;center&quot;;ctx.fillText(&quot;✓&quot;,120,y+52);
    ctx.font=&quot;bold 28px Arial&quot;;
    ctx.fillText(&quot;VIGILADO POR EL IMSS  |  &quot;+d.banco.toUpperCase(),W/2+10,y+52);
    y+=88;

    // ── NOMBRE ────────────────────────────────────────
    ctx.fillStyle=&quot;#666&quot;;ctx.font=&quot;28px Arial&quot;;ctx.textAlign=&quot;left&quot;;ctx.fillText(&quot;Estimado:&quot;,54,y+36);
    ctx.fillStyle=&quot;#111&quot;;ctx.font=&quot;bold 74px Arial&quot;;ctx.fillText(d.nom,54,y+112);
    ctx.fillStyle=&quot;#555&quot;;ctx.font=&quot;26px Arial&quot;;ctx.fillText(&quot;Con gusto le presentamos su cotizacion personalizada:&quot;,54,y+150);
    y+=168;

    // ── 4 CARDS ───────────────────────────────────────
    var COLS =[&quot;#5E35B1&quot;,&quot;#1565C0&quot;,&quot;#2E7D32&quot;,&quot;#4A148C&quot;];
    var ICBG =[&quot;#EDE7F6&quot;,&quot;#E3F2FD&quot;,&quot;#E8F5E9&quot;,&quot;#F3E5F5&quot;];
    var NAMES=[&quot;MAX DINERO&quot;,&quot;MISMO DESC.&quot;,&quot;SOLO DEUDA 60M&quot;,&quot;SOLO DEUDA &quot;+ops[4].pla+&quot;M&quot;];
    var SEL=_sel,nSel=SEL.length;
    var gap=14,sx=26,cwBase=494;

    function chFor(o){
      var h=64+26;            // header + aire
      h+=30+46;               // Monto
      if(o.rem&gt;0)h+=30+44;    // Dinero a recibir
      h+=30+42;               // Descuento
      h+=30+40;               // Ahorro
      h+=54;                  // footer plazo/cat
      return h;
    }

    var numCard=0;
    for(var r0=0;r0&lt;nSel;r0+=2){
      var fila=SEL.slice(r0,r0+2);
      var ch=0;
      fila.forEach(function(ix){var hh=chFor(ops[ix]);if(hh&gt;ch)ch=hh;});
      for(var c0=0;c0&lt;fila.length;c0++){
        var oi=fila[c0],o=ops[oi],col=COLS[oi-1],icbg=ICBG[oi-1];
        numCard++;
        var cw=cwBase,cx;
        if(nSel===1){cw=720;cx=(W-cw)/2;}
        else if(fila.length===1){cx=sx+(cwBase+gap)/2;}
        else{cx=sx+c0*(cwBase+gap);}
        var cy=y;

        // Sombra + fondo + borde
        ctx.fillStyle=&quot;rgba(0,0,0,0.06)&quot;;
        ctx.beginPath();ctx.roundRect(cx+3,cy+3,cw,ch,14);ctx.fill();
        ctx.fillStyle=&quot;#FFF&quot;;ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,14);ctx.fill();
        ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,14);ctx.stroke();
        // Header de color
        ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(cx,cy,cw,58,14);ctx.fill();
        ctx.fillRect(cx,cy+40,cw,18);
        ctx.fillStyle=&quot;#FFF&quot;;ctx.font=&quot;bold 26px Arial&quot;;ctx.textAlign=&quot;left&quot;;
        ctx.fillText(&quot;OP&quot;+numCard+&quot;   |   &quot;+NAMES[oi-1],cx+20,cy+40);

        // Icono circular IZQUIERDA
        var areaTop=cy+58,areaBot=cy+ch-54;
        var icx=cx+74,icy=(areaTop+areaBot)/2;
        ctx.fillStyle=icbg;ctx.beginPath();ctx.arc(icx,icy,48,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=col;ctx.font=&quot;bold 34px Arial&quot;;ctx.textAlign=&quot;center&quot;;
        ctx.fillText(oi===1?&quot;$&quot;:oi===2?&quot;$&quot;:&quot;OK&quot;,icx,icy+12);

        // Datos a la derecha del icono
        var tx=cx+148,ty=cy+92;
        ctx.textAlign=&quot;left&quot;;

        ctx.fillStyle=&quot;#666&quot;;ctx.font=&quot;22px Arial&quot;;ctx.fillText(&quot;Monto:&quot;,tx,ty);ty+=40;
        ctx.fillStyle=&quot;#111&quot;;ctx.font=&quot;bold 40px Arial&quot;;ctx.fillText(fmt(o.tot),tx,ty);ty+=42;

        if(o.rem&gt;0){
          ctx.fillStyle=&quot;#666&quot;;ctx.font=&quot;22px Arial&quot;;ctx.fillText(&quot;Dinero a recibir:&quot;,tx,ty);ty+=38;
          ctx.fillStyle=&quot;#2E7D32&quot;;ctx.font=&quot;bold 38px Arial&quot;;ctx.fillText(fmt(o.rem),tx,ty);ty+=40;
        }

        ctx.fillStyle=&quot;#666&quot;;ctx.font=&quot;22px Arial&quot;;ctx.fillText(&quot;Descuento de la pension:&quot;,tx,ty);ty+=36;
        ctx.fillStyle=&quot;#E65100&quot;;ctx.font=&quot;bold 36px Arial&quot;;ctx.fillText(fmtD(o.des),tx,ty);ty+=40;

        ctx.fillStyle=&quot;#666&quot;;ctx.font=&quot;22px Arial&quot;;ctx.fillText(&quot;Ahorro vs tasa actual:&quot;,tx,ty);ty+=34;
        ctx.fillStyle=&quot;#E65100&quot;;ctx.font=&quot;bold 34px Arial&quot;;ctx.fillText(fmt(o.aho),tx,ty);

        // Footer: linea + Plazo | CAT
        var fy=cy+ch-54;
        ctx.strokeStyle=&quot;#E5E5E5&quot;;ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(cx,fy);ctx.lineTo(cx+cw,fy);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx+cw/2,fy+10);ctx.lineTo(cx+cw/2,fy+44);ctx.stroke();
        ctx.fillStyle=&quot;#333&quot;;ctx.font=&quot;bold 24px Arial&quot;;ctx.textAlign=&quot;left&quot;;
        ctx.fillText(&quot;Plazo: &quot;+o.pla+&quot;m&quot;,cx+44,fy+36);
        ctx.fillText(&quot;CAT: &quot;+o.cat.toFixed(2)+&quot;%&quot;,cx+cw/2+44,fy+36);
        // iconos pequenos
        ctx.strokeStyle=&quot;#555&quot;;ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(cx+26,fy+28,9,0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx+26,fy+23);ctx.lineTo(cx+26,fy+28);ctx.lineTo(cx+30,fy+30);ctx.stroke();
        ctx.strokeStyle=&quot;#555&quot;;
        ctx.beginPath();ctx.arc(cx+cw/2+26,fy+28,9,0,Math.PI*2);ctx.stroke();
      }
      y+=ch+gap;
    }
    y+=4;

    // ── DEUDAS ────────────────────────────────────────
    var lnComp=d.deudasComp.map(function(dd){return dd.fin+&quot;: &quot;+fmt(dd.s);});
    var ln1=lnComp.slice(0,2).join(&quot;   |   &quot;);
    var ln2=lnComp.length&gt;2?lnComp.slice(2).join(&quot;   |   &quot;):&quot;&quot;;
    var lnPerm=d.deudasPerm.length&gt;0?d.deudasPerm.map(function(dd){return dd.fin+&quot; permanente: &quot;+fmt(dd.m*12)+&quot; anual&quot;;}).join(&quot;   |   &quot;):&quot;&quot;;
    var dbH=80+(ln2?30:0)+(lnPerm?30:0);
    ctx.fillStyle=&quot;#FFF9F0&quot;;ctx.beginPath();ctx.roundRect(26,y,W-52,dbH,14);ctx.fill();
    ctx.strokeStyle=&quot;#FFCCAA&quot;;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(26,y,W-52,dbH,14);ctx.stroke();
    ctx.fillStyle=&quot;#E65100&quot;;ctx.beginPath();ctx.arc(74,y+dbH/2,32,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=&quot;#FFF&quot;;ctx.font=&quot;bold 28px Arial&quot;;ctx.textAlign=&quot;center&quot;;ctx.fillText(&quot;$&quot;,74,y+dbH/2+10);
    ctx.fillStyle=&quot;#E65100&quot;;ctx.font=&quot;bold 28px Arial&quot;;ctx.textAlign=&quot;left&quot;;
    ctx.fillText(&quot;DEUDAS QUE SE LIQUIDAN:&quot;,116,y+38);
    ctx.fillStyle=&quot;#333&quot;;ctx.font=&quot;24px Arial&quot;;
    var dy=y+70;
    ctx.fillText(ln1,116,dy);
    if(ln2){dy+=30;ctx.fillText(ln2,116,dy);}
    if(lnPerm){dy+=30;ctx.fillStyle=&quot;#888&quot;;ctx.font=&quot;20px Arial&quot;;ctx.fillText(lnPerm,116,dy);}
    y+=dbH+16;

    // ── MOTIVACIONAL ──────────────────────────────────
    ctx.fillStyle=&quot;#1B5E20&quot;;ctx.fillRect(0,y,W,136);
    ctx.fillStyle=&quot;rgba(255,255,255,0.15)&quot;;ctx.beginPath();ctx.arc(72,y+68,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=&quot;#FF8C00&quot;;ctx.font=&quot;bold 50px Arial&quot;;ctx.textAlign=&quot;center&quot;;ctx.fillText(&quot;★&quot;,72,y+84);
    ctx.fillStyle=&quot;#FFF&quot;;ctx.font=&quot;bold 34px Arial&quot;;
    ctx.fillText(&quot;Aprovecha la mejor tasa del programa&quot;,W/2,y+40);
    ctx.fillStyle=&quot;#FF8C00&quot;;ctx.font=&quot;bold 32px Arial&quot;;
    ctx.fillText(&quot;para Pensionados del IMSS&quot;,W/2,y+80);
    ctx.fillStyle=&quot;rgba(255,255,255,0.85)&quot;;ctx.font=&quot;22px Arial&quot;;
    ctx.fillText(&quot;Liquida deudas y mejora tu situacion financiera&quot;,W/2,y+114);
    ctx.fillStyle=&quot;rgba(255,255,255,0.15)&quot;;ctx.beginPath();ctx.arc(W-72,y+68,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=&quot;#FFF&quot;;ctx.font=&quot;bold 44px Arial&quot;;ctx.fillText(&quot;✋&quot;,W-72,y+84);
    y+=152;

    // ── QR + VALIDACION ───────────────────────────────
    var qrH=d.asesorNom||d.asesorTel?240:200;
    ctx.fillStyle=&quot;#F0F4FF&quot;;ctx.fillRect(0,y,W,qrH);
    ctx.strokeStyle=&quot;#BBDEFB&quot;;ctx.lineWidth=1;ctx.strokeRect(0,y,W,qrH);
    // QR más pequeño con fondo blanco
    var qrSize=156;
    ctx.fillStyle=&quot;#FFF&quot;;ctx.beginPath();ctx.roundRect(36,y+22,qrSize+16,qrSize+16,10);ctx.fill();
    ctx.drawImage(lQ,44,y+30,qrSize,qrSize);
    // Texto bien separado del QR
    var tx=36+qrSize+40;
    ctx.fillStyle=&quot;#1565C0&quot;;ctx.font=&quot;bold 28px Arial&quot;;ctx.textAlign=&quot;left&quot;;
    ctx.fillText(&quot;Escanea y verifica&quot;,tx,y+48);
    ctx.fillText(&quot;nuestra consultoria&quot;,tx,y+82);
    ctx.fillStyle=&quot;#555&quot;;ctx.font=&quot;22px Arial&quot;;
    ctx.fillText(&quot;Confirma que tu asesor&quot;,tx,y+118);
    ctx.fillText(&quot;es REAL y certificado&quot;,tx,y+146);
    ctx.fillStyle=&quot;#E65100&quot;;ctx.font=&quot;bold 22px Arial&quot;;
    ctx.fillText(&quot;cwvlconsultoria.com/validacion&quot;,tx,y+180);
    if(d.asesorNom||d.asesorTel){
      ctx.fillStyle=&quot;#0D47A1&quot;;ctx.font=&quot;bold 24px Arial&quot;;
      ctx.fillText(&quot;Su asesor: &quot;+(d.asesorNom||&quot;&quot;),tx,y+212);
      ctx.fillStyle=&quot;#E65100&quot;;ctx.font=&quot;bold 22px Arial&quot;;
      ctx.fillText(d.asesorTel?&quot;WA: &quot;+d.asesorTel:&quot;&quot;,tx,y+238);
    }
    y+=qrH+16;

    // ── FOOTER ────────────────────────────────────────
    var fH=128;
    ctx.fillStyle=&quot;#1B5E20&quot;;ctx.fillRect(0,y,W,fH);
    ctx.fillStyle=&quot;#FFF&quot;;ctx.font=&quot;bold 26px Arial&quot;;ctx.textAlign=&quot;center&quot;;
    ctx.fillText(&quot;Vigilado por el IMSS  |  &quot;+d.banco,W/2,y+36);
    ctx.fillStyle=&quot;rgba(255,255,255,0.8)&quot;;ctx.font=&quot;21px Arial&quot;;
    ctx.fillText(&quot;Protegido por la CNBV&quot;,W/2,y+68);
    ctx.fillStyle=&quot;rgba(255,255,255,0.6)&quot;;ctx.font=&quot;19px Arial&quot;;
    ctx.fillText(&quot;cwvlconsultoria.com/aviso-de-privacidad&quot;,W/2,y+96);
    ctx.fillStyle=&quot;rgba(255,255,255,0.35)&quot;;ctx.font=&quot;15px Arial&quot;;
    ctx.fillText(&quot;Montos aproximados. Sujetos a evaluacion y aprobacion de credito.&quot;,W/2,y+118);
    y+=fH;

    // Recortar exacto
    var fc=document.createElement(&quot;canvas&quot;);fc.width=W;fc.height=y;
    fc.getContext(&quot;2d&quot;).drawImage(cv,0,0);
    return fc.toDataURL(&quot;image/png&quot;);
  });
}

  modal.classList.add(&quot;vis&quot;);

  dibujarResumen().then(function(du){

      &quot;&lt;/div&gt;&quot;+
      &quot;&lt;p style=\&quot;color:rgba(255,255,255,.85);font-size:13px;text-align:center;margin-bottom:8px;font-weight:600\&quot;&gt;↓ Tu propuesta lista — usa los botones de arriba para enviarla&lt;/p&gt;&quot;+
      &quot;&lt;img class=\&quot;mimg\&quot; src=\&quot;&quot;+du+&quot;\&quot; alt=\&quot;Resumen\&quot;&gt;&quot;;
    document.getElementById(&quot;mclose2&quot;).addEventListener(&quot;click&quot;,cerrar);
    document.getElementById(&quot;mbtn-dl&quot;).addEventListener(&quot;click&quot;,guardar);
    document.getElementById(&quot;mbtn-wp&quot;).addEventListener(&quot;click&quot;,compartir);
  }).catch(function(){alert(&quot;Error al generar.&quot;);cerrar();});
}

function getBlob(){return fetch(dataUrl).then(function(r){return r.blob();});}

function guardar(){
  getBlob().then(function(blob){
    var nombre=&quot;cotizacion_&quot;+(dat.nom||&quot;cliente&quot;).replace(/ /g,&quot;_&quot;)+&quot;.png&quot;;
    var file=new File([blob],nombre,{type:&quot;image/png&quot;});
    if(navigator.share&amp;&amp;navigator.canShare&amp;&amp;navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:&quot;Cotizacion CWVL&quot;});
    }else{
      var url=URL.createObjectURL(blob);
      var a=document.createElement(&quot;a&quot;);a.href=url;a.download=nombre;a.click();
      setTimeout(function(){URL.revokeObjectURL(url);},2000);
    }
  }).catch(function(){alert(&quot;Manten presionada la imagen y elige Guardar imagen.&quot;);});
}

function compartir(){
  getBlob().then(function(blob){
    var file=new File([blob],&quot;cotizacion.png&quot;,{type:&quot;image/png&quot;});
    if(navigator.share&amp;&amp;navigator.canShare&amp;&amp;navigator.canShare({files:[file]})){
      navigator.share({files:[file],text:msgTodas()}).catch(function(e){
        if(e&amp;&amp;e.name!==&quot;AbortError&quot;)window.open(waUrl(msgTodas()),&quot;_blank&quot;);
      });
    }else{window.open(waUrl(msgTodas()),&quot;_blank&quot;);}
  }).catch(function(){window.open(waUrl(msgTodas()),&quot;_blank&quot;);});
}

  banco=&quot;&quot;;dat={};ops=[];MRA=[0,0,0,0,0];CAPRA=[0,0,0,0,0];dataUrl=&quot;&quot;;
  for(var q=2;q&lt;=4;q++){var bq=document.getElementById(&quot;blk-d&quot;+q);if(bq)bq.style.display=&quot;none&quot;;}

      document.getElementById(&quot;anio&quot;+d).addEventListener(&quot;change&quot;,function(){autoCAT(d);});

      document.getElementById(&quot;anfec&quot;+d).addEventListener(&quot;change&quot;,function(){validarPagos(d);});

      document.getElementById(&quot;comp&quot;+d).addEventListener(&quot;change&quot;,function(){actualizarDeudas();validar();});
      var bd=document.getElementById(&quot;btn-del&quot;+d);
      if(bd)bd.addEventListener(&quot;click&quot;,function(){delDeuda(d);});
    })(n);
  }
  document.getElementById(&quot;btn-add&quot;).addEventListener(&quot;click&quot;,addDeuda);
  // Chips de seleccion
  function actualizarBtnResumen(){
    var n=getSelOps().length;

  }
  [1,2,3,4].forEach(function(i){
    document.getElementById(&quot;chip&quot;+i).addEventListener(&quot;click&quot;,function(){
      selOps[i]=!selOps[i];
      this.classList.toggle(&quot;opon&quot;,selOps[i]);
      this.classList.toggle(&quot;opoff&quot;,!selOps[i]);
      actualizarBtnResumen();
    });
  });
  // edad
  document.getElementById(&quot;edad&quot;).addEventListener(&quot;input&quot;,validar);

  document.getElementById(&quot;b-inbursa&quot;).addEventListener(&quot;click&quot;,function(){selBanco(&quot;inbursa&quot;);});
  document.getElementById(&quot;b-bancrea&quot;).addEventListener(&quot;click&quot;,function(){selBanco(&quot;bancrea&quot;);});
  document.getElementById(&quot;b-multiva&quot;).addEventListener(&quot;click&quot;,function(){selBanco(&quot;multiva&quot;);});
  // botones calc
  document.getElementById(&quot;btn-calc&quot;).addEventListener(&quot;click&quot;,calcular);
  document.getElementById(&quot;btn-resumen&quot;).addEventListener(&quot;click&quot;,verResumen);
  document.getElementById(&quot;btn-todas&quot;).addEventListener(&quot;click&quot;,envTodas);
  document.getElementById(&quot;btn-tramite&quot;).addEventListener(&quot;click&quot;,envTramite);
  document.getElementById(&quot;btn-nueva&quot;).addEventListener(&quot;click&quot;,limpiar);
  // opciones
  [1,2,3,4].forEach(function(i){
    document.getElementById(&quot;bwp&quot;+i).addEventListener(&quot;click&quot;,function(){envWA(i);});
    document.getElementById(&quot;bcp&quot;+i).addEventListener(&quot;click&quot;,function(){copMsg(i);});
    document.getElementById(&quot;btar&quot;+i).addEventListener(&quot;click&quot;,function(){verTarjeta(i);});
  });
});
